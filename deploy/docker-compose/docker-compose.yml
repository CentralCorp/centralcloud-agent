name: centralcloud-agent-test
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: centralcloud_provisioner
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: postgres
    secrets:
      - postgres_password
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U centralcloud_provisioner -d postgres"]
      interval: 2s
      timeout: 3s
      retries: 20
    tmpfs:
      - /var/lib/postgresql/data

  traefik:
    image: traefik:v3.4
    container_name: centralcloud-traefik
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.websecure.address=:443
      - --api.insecure=true
    ports:
      - "127.0.0.1:8443:443"
      - "127.0.0.1:8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

secrets:
  postgres_password:
    file: ../../secrets/postgres_password
