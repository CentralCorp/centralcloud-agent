name: ci
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.5
          cache: true
      - name: gofmt
        run: test -z "$(gofmt -l cmd internal pkg)"
      - run: go vet ./...
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
      - run: go test ./...
      - run: go test -race ./...

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.5
      - run: CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.arch }} go build -trimpath -o centralcloud-agent ./cmd/agent

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: centralcloud-node-agent:ci

  integration:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.5
      - name: Prepare isolated secrets
        run: mkdir -p secrets && printf 'integration-postgres-password' > secrets/postgres_password
      - name: Start isolated infrastructure
        run: docker compose up -d postgres traefik && docker compose exec -T postgres sh -c 'until pg_isready -U centralcloud_provisioner; do sleep 1; done'
      - name: Build fake panel
        run: docker build -f deploy/docker-compose/fake-panel.Dockerfile -t ghcr.io/centralcorp/centralpanel:integration .
      - name: Integration lifecycle
        env:
          CENTRALCLOUD_INTEGRATION: "1"
          CENTRALCLOUD_POSTGRES_PASSWORD_FILE: ${{ github.workspace }}/secrets/postgres_password
        run: go test -tags=integration -v ./internal/integration
      - if: always()
        run: docker compose down -v --remove-orphans
